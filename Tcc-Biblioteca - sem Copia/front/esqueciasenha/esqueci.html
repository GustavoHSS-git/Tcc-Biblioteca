<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Livraria Digital</title>
    <link rel="stylesheet" href="esqueci.css">
</head>
<body>
    <div class="container" id="container">
        <div class="form-container sign-in-container" style="width: 100%; position: relative;">
            <form id="forgotPasswordForm">
                <img src="../fotos/logo3p.png" alt="Logo" class="form-logo" />
                <h1>Recuperar Senha</h1>
                <p>Digite seu e-mail para receber um link de redefinição.</p>
                
                <input type="email" id="resetEmail" placeholder="Seu e-mail cadastrado" required />
                
                <button type="submit" class="btn-primary" id="btnReset">Enviar Link</button>
                
                <a href="/front/Login/Login.html">Voltar para o Login</a>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="esqueci.js"></script>
</body>
</html>
