<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Livraria</title>
    <link rel="shortcut icon" href="/front/fotos/logo3.ico" type="image/x-icon">
    <link rel="stylesheet" href="./catalogo.css">
</head>
<body>
    <!-- ============================
         HEADER: Navegação e Logo
         ============================ -->
    <header class="page-top">
        <nav class="navbar">
            <div class="container nav-container">
                <div class="nav-left">
                    <a href="/inicial/i.html" class="brand">
                        <img src="/fotos/logo.png" alt="Logo Biblioteca" class="brand-img">
                    </a>
                    <ul class="nav-links">
                        <li><a href="/inicial/i.html" class="nav-link">Início</a></li>
                        <li><a href="/loja/catalogo.html" class="nav-link active">Loja</a></li>
                        <li><a href="/biblioteca/bibliotecaindex.html" class="nav-link">Biblioteca</a></li>
                        <li><a href="/desejos/desejos.html" class="nav-link">Desejos</a></li>
                        <li><a href="/perfil/perfil.html" class="nav-link">Perfil</a></li>
                    </ul>
                </div>
                <div class="nav-right" style="display: flex; gap: 15px; align-items: center;">
                    <button class="cart-btn" id="cartBtn">
                        Carrinho (<span id="cartCount">0</span>)
                    </button>
                    <button id="logoutBtn" class="logout-btn">Sair</button>
                </div>
            </div>
        </nav>
    </header>

    <!-- ============================
         SEÇÃO DE FILTROS E BUSCA
         ============================ -->
    <section class="filters-section">
        <div class="container">
            <div class="filters">
                <!-- Campo de busca por título/autor -->
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Buscar por título ou autor..."
                >
                <!-- Select para escolher categoria: Todos / Livros / Mangás -->
                <select id="categorySelect" class="category-select">
                    <option value="all">Todos</option>
                    <option value="livro">Livros</option>
                    <option value="manga">Mangás</option>
                </select>
                <!-- Select para ordenação -->
                <select id="sortSelect" class="sort-select">
                    <option value="name-asc">Nome (A-Z)</option>
                    <option value="name-desc">Nome (Z-A)</option>
                    <option value="price-asc">Preço (menor)</option>
                    <option value="price-desc">Preço (maior)</option>
                </select>
            </div>
        </div>
    </section>

    <!-- ============================
         GRID DE LIVROS
         ============================ -->
    <section class="books-section">
        <div class="container">
            <h1>Nosso Catálogo</h1>
            <!-- Container onde os cards dos livros serão inseridos dinamicamente pelo JS -->
            <div class="books-grid" id="booksGrid">
                <!-- Cards serão inseridos aqui dinamicamente -->
            </div>
            <div id="pagination" class="pagination-container"></div>
        </div>
    </section>

    <!-- ============================
         MODAL DO CARRINHO
         ============================ -->
    <div class="cart-modal" id="cartModal">
        <div class="cart-modal-content">
            <button class="close-btn" id="closeCart">&times;</button>
            <h2>Seu Carrinho</h2>
            <!-- Lista de itens no carrinho (preenchida dinamicamente) -->
            <div class="cart-items" id="cartItems">
                <p class="empty-cart">Carrinho vazio</p>
            </div>
            <div class="cart-summary">
                <!-- Valor total da compra -->
                <div class="cart-total">
                    <strong>Total:</strong>
                    <span id="cartTotal">R$ 0,00</span>
                </div>
                <!-- Botão para ir ao checkout -->
                <button class="checkout-btn" id="checkoutBtn">Ir para Checkout</button>
            </div>
        </div>
    </div>

    <!-- Modal PIX -->
    <div class="pix-modal" id="pixModal" style="display: none;">
        <div class="pix-modal-content">
            <button class="close-btn" onclick="fecharPix()">&times;</button>
            <h2>Pagar com Pix</h2>
            <div class="pix-container" style="text-align: center; padding: 20px;">
                <img id="qrPix" src="" alt="QR Code Pix" style="margin-bottom: 15px;">
                <p id="codigoPix" style="word-break: break-all; font-family: monospace; background: #eee; padding: 10px;"></p>
            </div>
            <div class="pix-actions">
                <button class="checkout-btn" onclick="copiarPix()">Copiar código</button>
                <button class="view-btn" onclick="fecharPix()">Fechar</button>
            </div>
        </div>
    </div>


    <!-- ============================
         MODAL DE DETALHES DO LIVRO
         ============================ -->
    <div class="detail-modal" id="detailModal">
        <div class="detail-modal-content">
            <button class="close-btn" id="closeDetail">&times;</button>
            <div class="detail-container">
                <!-- Coluna esquerda: imagem e galeria de miniaturas -->
                <div class="detail-image">
                    <!-- Imagem principal do livro -->
                    <img id="detailImg" src="" alt="Livro">
                    <!-- Miniaturas/galeria (preenchidas via JS) -->
                    <div id="detailThumbs" class="detail-thumbs" aria-label="Miniaturas">
                        <!-- miniaturas preenchidas via JS -->
                    </div>
                </div>
                <!-- Coluna direita: informações do livro -->
                <div class="detail-info">
                    <!-- Título, autor, descrição, preço -->
                    <h2 id="detailTitle"></h2>
                    <p class="detail-author" id="detailAuthor"></p>
                    <p class="detail-description" id="detailDescription"></p>
                    <button class="ver-mais-btn" id="verMaisBtn" style="display: none;">Ver mais</button>
                    <button class="translate-btn" id="translateBtn">Traduzir Sinopse</button>
                    <div class="detail-price">
                        <span class="price" id="detailPrice"></span>
                    </div>
                    <!-- Botão para adicionar ao carrinho -->   
                    <button class="add-cart-btn" id="addCartBtn">Adicionar ao Carrinho</button>
                    
                    <!-- Botão para ir aos detalhes completos -->
                    <button class="saber-mais-btn" onclick="irParaDadosLivro()">Ver mais detalhes</button>
                    
                    <!-- Seção: Mais do mesmo autor -->
                    <div class="more-by-author">
                        <h3>Mais do autor</h3>
                        <!-- Grid com outros livros do mesmo autor (preenchido via JS) -->
                        <div id="moreByAuthor" class="more-by-author-grid">
                            <!-- preenchido via JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Rodapé -->
    <footer class="footer">
        <p>&copy; Livraria 2025</p>
    </footer>

    <script src="./navbar-auth.js"></script>
    <script src="./catalogo.js"></script>
    <script src="../api/mercadopago.js"></script>
    <script>
    async function pagar() {
        try {
            const resposta = await fetch("http://localhost:3000/criar-pagamento", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    valor: 50,
                    email: "cliente@email.com"
                })
            });

            if (!resposta.ok) {
                throw new Error(`Erro HTTP: ${resposta.status}`);
            }

            const dados = await resposta.json();

            if (!dados || !dados.qr_code_base64) {
                throw new Error("QR Code não recebido do servidor");
            }

            const qrElement = document.getElementById("qr");
            if (qrElement) {
                qrElement.src = "data:image/png;base64," + dados.qr_code_base64;
            }
        } catch (erro) {
            console.error("Erro ao criar pagamento:", erro);
            alert("Erro ao processar pagamento: " + erro.message);
        }
    }
    </script>
</body>
</html>
