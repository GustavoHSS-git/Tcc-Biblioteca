<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Admin - Biblioteca Digital</title>
    <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <h1>Painel de Admin - Livraria Digital</h1>
            <button id="logoutBtn" class="btn-logout">Sair</button>
        </div>
    </nav>

    <main class="admin-container">

    <h2>Gerenciar Promoções e Descontos</h2>
    <form id="promotionForm" class="promotion-form">
        <div class="form-group">
            <label for="promotionId">ID (apenas para editar)</label>
            <input type="number" id="promotionId" placeholder="Auto-gerado" disabled>
        </div>

        <div class="form-group">
            <label for="promotionBook">Aplicar Promoção em *</label>
            <select id="promotionBook" required>
                <option value="">-- Selecionar --</option>
                <option value="all">Todos os Livros e Mangás</option>
                <option value="book">Apenas Livros</option>
                <option value="manga">Apenas Mangás</option>
            </select>
        </div>

        <div class="form-group">
            <label for="discountType">Tipo de Desconto *</label>
            <select id="discountType" required>
                <option value="">-- Selecionar --</option>
                <option value="percentual">Percentual (%)</option>
                <option value="fixo">Valor Fixo (R$)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="discountValue">Valor do Desconto *</label>
            <input type="number" id="discountValue" placeholder="10 ou 10.50" step="0.01" min="0" required>
        </div>

        <div class="form-row" style="display: flex; gap: 20px;">
            <div class="form-group" style="flex: 1;">
                <label for="startDate">Data de Início *</label>
                <input type="datetime-local" id="startDate" required>
            </div>

            <div class="form-group" style="flex: 1;">
                <label for="endDate">Data de Fim *</label>
                <input type="datetime-local" id="endDate" required>
            </div>
        </div>

        <div class="form-group">
            <label for="promotionDescription">Descrição da Promoção</label>
            <textarea id="promotionDescription" placeholder="Ex: Black Friday 2024" rows="2" data-word-limit="50"></textarea>
            <div id="promotionDescriptionCount" class="word-count" style="text-align: right; font-size: 0.8rem; color: #666; margin-top: 4px;">0 / 50 palavras</div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Salvar Promoção</button>
            <button type="button" id="cancelPromotionBtn" class="btn-cancelBtn">Cancelar</button>
        </div>
    </form>

    <section class="promotions-list-section">
        <h3>Promoções Cadastradas</h3>
        <div id="promotionsList" class="promotions-list">
            <p class="loading">Carregando promoções...</p>
        </div>
    </section>
</section>
    </main>

    <script src="/admin/admin-auth.js"></script>
    <script src="/admin/admin.js"></script>
    <script src="/admin/promotions.js"></script>
</body>
</html>
